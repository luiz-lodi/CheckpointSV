<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Checkpoints</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; }
        h3 { color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 5px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-bottom: 5px;}
        
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-camera { background-color: #7f8c8d; padding: 10px; }
        .btn-acessar { background-color: #2c3e50; }
        
        /* Cores dos status */
        .btn-separado { background-color: #f39c12; } 
        .btn-conferido { background-color: #8e44ad; } 
        .btn-recebido { background-color: #3498db; } 
        .btn-entregue { background-color: #2ecc71; } 

        #historico { margin-top: 30px; }
        .registro { background: #ecf0f1; padding: 10px; margin-bottom: 8px; border-radius: 5px; font-size: 13px; line-height: 1.4; }
        
        /* Caixas que começam escondidas */
        #tela-logistica { display: none; }
        #caixa-destino { display: none; background: #e8f6f3; padding: 15px; border-radius: 8px; border: 2px dashed #1abc9c; margin-bottom: 15px;}
        #leitor-camera { width: 100%; display: none; margin-bottom: 15px; }
        
        .saudacao { text-align: center; color: #27ae60; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>CHECKPOINT DE PEDIDOS - HSVP</h1>
        
        <div id="tela-login">
            <div class="input-group">
                <label for="idMatricula">Matrícula:</label>
                <input type="number" id="idMatricula" placeholder="Digite seu número de matrícula">
                <button class="btn-acessar" onclick="validarAcesso()">Acessar Sistema</button>
            </div>
        </div>

        <div id="leitor-camera"></div>

        <div id="tela-logistica">
            <div class="saudacao" id="mensagemSaudacao"></div>

            <div class="input-group">
                <label for="idRequisicao">Requisição Tasy (7 dígitos):</label>
                <input type="number" id="idRequisicao" placeholder="Ex: 1234567">
                <button class="btn-camera" onclick="iniciarCamera('requisicao')">📷 Escanear Requisição</button>
            </div>

            <div id="caixa-destino">
                <label style="font-weight:bold; margin-bottom:5px; display:block;">Confirme o Setor Destino:</label>
                <input type="text" id="idSetorDestino" placeholder="Digite ou escaneie o setor" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
                <button class="btn-camera" onclick="iniciarCamera('setor')">📷 Escanear QR do Setor</button>
                <button class="btn-entregue" onclick="finalizarEntrega()">Gravar Entrega Final</button>
            </div>

            <h3>Registrar Evento</h3>
            <div class="botoes-status" id="botoes-padrao">
                <button class="btn-separado" onclick="registrarEvento('Separado')">📦 Separado</button>
                <button class="btn-conferido" onclick="registrarEvento('Conferido')">🔍 Conferido</button>
                <button class="btn-recebido" onclick="registrarEvento('Recebido (Almox Central)')">📥 Recebido</button>
                <button class="btn-entregue" onclick="abrirCaixaDestino()">✅ Entregue (Setor Destino)</button>
            </div>

            <div id="historico">
                <h3>Histórico de Eventos</h3>
                <div id="listaRegistros"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. BANCO DE DADOS DE COLABORADORES (Extraído do seu PDF)
        const listaColaboradores = {
            "144006": "BRUNA LOURENCO",
            "1249": "BRUNA QUEVEDO",
            "168314": "CAIO MATHEUS",
            "167407": "ENI",
            "1764": "GUILHERME",
            "163591": "HENZO",
            "167702": "JOAO GUSTAVO",
            "151357": "LUIZ HENRIQUE",
            "54976": "MAURO",
            "500008": "OTAVIO",
            "76988": "ROSELIA",
            "168297": "STEFANI",
            "168604": "ALESSANDRO",
            "162513": "DANIEL",
            "166732": "ARMANDO",
            "168313": "ERICK",
            "104602": "EVANDRO",
            "164846": "FERNANDA",
            "147628": "GABRIEL",
            "292": "IDERALDO",
            "166913": "LUIS GUSTAVO",
            "167733": "RAFAEL",
            "139320": "RENAN"
        };

        let nomeOperadorAtual = "";
        let modoCamera = ""; // Pode ser 'requisicao' ou 'setor'
        let leitorHtml5Qrcode;

        window.onload = function() {
            carregarHistorico();
        };

        // --- LÓGICA DE VALIDAÇÃO (LOGIN) ---
        function validarAcesso() {
            const matriculaDigitada = document.getElementById('idMatricula').value.trim();
            
            // Verifica se a matrícula digitada existe na nossa lista
            if (listaColaboradores[matriculaDigitada]) {
                nomeOperadorAtual = listaColaboradores[matriculaDigitada];
                
                // Esconde a tela de login e mostra a tela de logística
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('tela-logistica').style.display = 'block';
                
                // Mostra uma saudação amigável
                document.getElementById('mensagemSaudacao').innerText = `Operador: ${nomeOperadorAtual}`;
            } else {
                alert("Matrícula não encontrada. Verifique o número e tente novamente.");
            }
        }

        // --- LÓGICA DA CÂMERA DUPLA ---
        function iniciarCamera(modo) {
            modoCamera = modo; // Informa à câmera o que estamos procurando
            document.getElementById('leitor-camera').style.display = 'block';

            if(leitorHtml5Qrcode) { leitorHtml5Qrcode.clear(); } // Limpa se já tiver uma câmera rodando

            leitorHtml5Qrcode = new Html5QrcodeScanner("leitor-camera", { fps: 10, qrbox: {width: 250, height: 250} });
            leitorHtml5Qrcode.render(aoLerComSucesso, aoDarErro);
        }

        function aoLerComSucesso(textoDecodificado) {
            // Se a câmera foi chamada para ler a Requisição Tasy
            if (modoCamera === 'requisicao') {
                if (textoDecodificado.length === 7 && !isNaN(textoDecodificado)) {
                    document.getElementById('idRequisicao').value = textoDecodificado;
                    desligarCamera();
                } else {
                    alert("Atenção: O código lido não é uma requisição Tasy (7 dígitos).");
                }
            } 
            // Se a câmera foi chamada para ler o Setor Destino
            else if (modoCamera === 'setor') {
                document.getElementById('idSetorDestino').value = textoDecodificado;
                desligarCamera();
            }
        }

        function desligarCamera() {
            leitorHtml5Qrcode.clear();
            document.getElementById('leitor-camera').style.display = 'none';
        }

        function aoDarErro(mensagemErro) { /* Silencia erros de foco da câmera */ }


        // --- LÓGICA DE CHECKPOINTS ---
        function abrirCaixaDestino() {
            // Esconde os botões normais e mostra a caixa de perguntar o setor
            document.getElementById('botoes-padrao').style.display = 'none';
            document.getElementById('caixa-destino').style.display = 'block';
        }

        function finalizarEntrega() {
            const setorDestino = document.getElementById('idSetorDestino').value.trim();
            if (setorDestino === '') {
                alert("Por favor, informe ou escaneie o setor destino.");
                return;
            }
            
            // Registra o evento juntando a palavra "Entregue" com o setor informado
            registrarEvento(`Entregue (${setorDestino})`);
            
            // Voltar a tela ao normal para o próximo pacote
            document.getElementById('idSetorDestino').value = '';
            document.getElementById('caixa-destino').style.display = 'none';
            document.getElementById('botoes-padrao').style.display = 'block';
        }

        function registrarEvento(statusFinal) {
            const matricula = document.getElementById('idMatricula').value.trim();
            const requisicao = document.getElementById('idRequisicao').value.trim();

            if (requisicao.length !== 7) { alert("Aviso: A requisição Tasy deve conter exatamente 7 dígitos numéricos!"); return; }

            const dataAtual = new Date();
            const timestamp = dataAtual.toLocaleString('pt-BR'); 

            const novoEvento = {
                matricula: matricula,
                nome: nomeOperadorAtual, // Salvando o nome também!
                requisicao: requisicao,
                status: statusFinal, 
                data: timestamp
            };

            salvarNoStorage(novoEvento);
            adicionarRegistroNaTela(novoEvento);

            document.getElementById('idRequisicao').value = '';
            document.getElementById('idRequisicao').focus(); 
        }

        // --- SALVAMENTO E HISTÓRICO ---
        function salvarNoStorage(evento) {
            let historico = JSON.parse(localStorage.getItem('historicoLogistica')) || [];
            historico.push(evento);
            localStorage.setItem('historicoLogistica', JSON.stringify(historico));
        }

        function carregarHistorico() {
            let historico = JSON.parse(localStorage.getItem('historicoLogistica')) || [];
            historico.reverse().forEach(evento => {
                adicionarRegistroNaTela(evento);
            });
        }

        function adicionarRegistroNaTela(evento) {
            const divLista = document.getElementById('listaRegistros');
            const novoItem = document.createElement('div');
            novoItem.className = 'registro';
            // Agora mostramos o NOME do funcionário em vez de só o número da matrícula
            novoItem.innerHTML = `
                <strong>Req:</strong> ${evento.requisicao} <br>
                <strong>Status:</strong> ${evento.status} <br>
                <strong>Operador:</strong> ${evento.nome} (${evento.matricula}) <br>
                <em>🕒 ${evento.data}</em>
            `;
            divLista.prepend(novoItem);
        }
    </script>

</body>
</html>
